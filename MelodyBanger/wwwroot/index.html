<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MelodyBanger — Music Store Showcase</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/tone"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
</head>
<body>
    <div class="app-container">
        <div class="toolbar">
            <div class="toolbar-group">
                <label for="languageSelect">
                    <i class="fas fa-globe"></i> Language
                </label>
                <select id="languageSelect">
                    <option value="en">🇺🇸 English (US)</option>
                    <option value="ru">🇷🇺 Russian</option>
                    <option value="kz">🇰🇿 Kazakh</option>
                </select>
            </div>

            <div class="toolbar-group">
                <label for="seedInput">
                    <i class="fas fa-dice-d6"></i> Seed
                </label>
                <input type="number" id="seedInput" value="123456789" step="1">
                <button id="randomSeedBtn" class="icon-btn" title="Random seed">
                    <i class="fas fa-dice"></i>
                </button>
            </div>

            <div class="toolbar-group">
                <label>Likes</label>
                <input type="range" id="likesInput" min="0" max="10" step="0.1" value="0">
                <span id="likesValue" class="value-display">0.0</span>
            </div>

            <div class="toolbar-group">
                <label>
                    <i class="fas fa-eye"></i> View
                </label>
                <div class="view-toggle">
                    <button id="tableViewBtn" class="view-btn active">
                        <i class="fas fa-table"></i> Table
                    </button>
                    <button id="galleryViewBtn" class="view-btn">
                        <i class="fas fa-th-large"></i> Gallery
                    </button>
                </div>
            </div>
        </div>

        <div id="tableView" class="view-container active">
            <div class="table-controls">
                <button id="prevPageBtn" class="page-btn" disabled>
                    <i class="fas fa-chevron-left"></i> Previous
                </button>
                <span id="pageInfo">Page 1</span>
                <button id="nextPageBtn" class="page-btn">
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            <div class="table-wrapper">
                <table id="songsTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Song</th>
                            <th>Artist</th>
                            <th>Album</th>
                            <th>Genre</th>
                            <th>Likes</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="7" class="loading">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="galleryView" class="view-container">
            <div id="galleryContainer" class="gallery-grid">
                <div class="loading">Loading...</div>
            </div>
            <div id="galleryLoader" class="gallery-loader" style="display: none;">
                <i class="fas fa-spinner fa-spin"></i> Loading more...
            </div>
        </div>
    </div>

    <audio id="audioPlayer" style="display: none;"></audio>

    <script src="/js/likes.js"></script>
    <script src="/js/audio-player.js"></script>
    <script src="/js/table-view.js"></script>
    <script src="/js/gallery-view.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
